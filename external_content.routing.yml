entity.external_content_source.collection:
  path: '/admin/config/services/external_content_sources'
  defaults:
    _entity_list: 'external_content_source'
    _title: 'External Content Sources'
  requirements:
    _permission: 'administer external_content_source'

entity.external_content_source.add_form:
  path: '/admin/config/services/external_content_sources/add'
  defaults:
    _entity_form: 'external_content_source.add'
    _title: 'Add an External Content Source'
  requirements:
    _permission: 'administer external_content_source'

entity.external_content_source.edit_form:
  path: '/admin/config/services/external_content_sources/{external_content_source}'
  defaults:
    _entity_form: 'external_content_source.edit'
    _title: 'Edit an External Content Source'
  requirements:
    _permission: 'administer external_content_source'
  options:
    _admin_route: TRUE
    parameters:
      external_content_source:
        type: entity:external_content_source
    breadcrumb:
      parent: entity.external_content_source.collection

entity.external_content_source.delete_form:
  path: '/admin/config/services/external_content_sources/{external_content_source}/delete'
  defaults:
    _entity_form: 'external_content_source.delete'
    _title: 'Delete an External Content Source'
  requirements:
    _permission: 'administer external_content_source'

external_content.autocomplete:
  path: '/external-content/autocomplete'
  defaults:
    _title: 'External Content Autocomplete'
    _controller: '\Drupal\external_content\Controller\ExternalContentAutocompleteController::handleNodeAutocomplete'
    _format: json
  requirements:
    _permission: 'access content'
  options:
    no_cache: 'TRUE'
