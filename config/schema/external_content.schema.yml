  label: Default value
  mapping:
    value:
      type: label
      label: Value

field.formatter.settings.external_content_preview:
  type: mapping
  label: ExternalContentPreview formatter settings
  mapping:
    limit:
      type: integer
      label: Limit

field.formatter.settings.external_content_template:
  type: mapping
  label: ExternalContentPreview formatter settings
  mapping:
    limit:
      type: integer
      label: Limit

field.formatter.settings.external_content_json:
  type: mapping
  label: ExternalContentPreview formatter settings
  mapping:
    limit:
      type: integer
      label: Limit