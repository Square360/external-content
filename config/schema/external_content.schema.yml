external_content.external_content_source.*:
  type: config_entity
  label: external_content_source
  mapping:
    id:
      type: string
      label: 'ID'
    label:
      type: label
      label: 'Label'
    resource:
      type: string
      label: 'Resource'
    term_resource:
      type: string
      label: 'Term Resource'
    term_field:
      type: string
      label: 'Term Field'
    includes:
      type: string
      label: 'Includes'

field.field_settings.external_content_item:
  type: mapping
  label: ExternalContentItem field settings
  mapping:
    enabled_souces:
